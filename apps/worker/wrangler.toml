name = "stablesync-worker"
main = "src/index.ts"
compatibility_date = "2026-05-03"
compatibility_flags = ["nodejs_compat"]
workers_dev = true



[[kv_namespaces]]
binding = "CACHE_KV"
id = "ce850408cc594b1caba33e1640926d68"

[[d1_databases]]
binding = "DECISIONS_DB"
database_name = "stablesync-decisions"
database_id = "c3d9cd58-a80f-4c3c-a220-a3ba26619e77"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "StableSyncMcpAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["StableSyncMcpAgent"]
