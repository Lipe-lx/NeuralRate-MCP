name = "neuralrate-worker"
main = "src/index.ts"
compatibility_date = "2026-05-03"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[secrets]
required = ["FRED_API_KEY", "NANSEN_API_KEY", "NEURALRATE_INTERNAL_API_TOKEN"]

[vars]
NEURALRATE_BENCHMARK_CONTRACT = "0xC0C836A220D006398cdE4D5caf529196E63f81A8"
NEURALRATE_VAULT_MODULE_ADDRESS = "0xf7061501a464e893636a5BF8eB4ab7Ba2819154D"
NEURALRATE_AGENT_SESSION_SIGNER_ADDRESS = "0xc57130F28f3d670cA75AD9a78784966B767E55e3"
MANTLE_SEPOLIA_RPC_URL = "https://rpc.sepolia.mantle.xyz"
NEURALRATE_CHAIN_ID = "5003"
NEURALRATE_CHAIN_NAME = "Mantle Sepolia"
NEURALRATE_ENV_PROFILE = "production"
NEURALRATE_POLICY_REGISTRY_CONTRACT = "0xc4580b5831f36eCc3E4865e635c970C75DD9869C"
NEURALRATE_EXECUTION_GUARD_CONTRACT = "0x666Bc822156824F40F2b70aAaAcBfe87467D79A5"
NEURALRATE_SAFE_4337_MODULE_ADDRESS = "0x62B79C3dF9F15A94ce821ac558ED74F011bB7a41"
NEURALRATE_SAFE_7579_ADAPTER_ADDRESS = "0x7ec994fD2F774Fb8AAe472C349ED3E64E0A15FEa"
NEURALRATE_SAFE_7579_LAUNCHPAD_ADDRESS = "0x16794305Ccd57F815cf81d7fE20d6B6b4E82AAd2"
NEURALRATE_DELEGATE_VALIDATOR_ADDRESS = "0x0A03F7763d53757183aD86C393eEfF6D8177e4cE"
NEURALRATE_4337_ENTRYPOINT_ADDRESS = "0x0000000071727De22E5E9d8BAf0edAc6f37da032"
NEURALRATE_ERC7484_REGISTRY_ADDRESS = "0x000000000069E2a187AEFFb852bF3cCdC95151B2"
NEURALRATE_PAYMASTER_ENABLED = "true"

[[services]]
binding = "EXECUTOR"
service = "neuralrate-executor"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "ce850408cc594b1caba33e1640926d68"

[[d1_databases]]
binding = "DECISIONS_DB"
database_name = "neuralrate-decisions"
database_id = "759b6330-f219-474a-b696-e2ca4f7e143a"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "NeuralRateMcpAgent"

[[durable_objects.bindings]]
name = "MCP_STATE_OBJECT"
class_name = "NeuralRateStateMcpAgent"

[[durable_objects.bindings]]
name = "MCP_READONLY_OBJECT"
class_name = "NeuralRateReadonlyMcpAgent"

[[durable_objects.bindings]]
name = "MCP_CONFIG_OBJECT"
class_name = "NeuralRateConfigMcpAgent"

[[durable_objects.bindings]]
name = "MCP_BENCHMARK_OBJECT"
class_name = "NeuralRateBenchmarkMcpAgent"

[[durable_objects.bindings]]
name = "MCP_EXECUTION_OBJECT"
class_name = "NeuralRateExecutionMcpAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["StableSyncMcpAgent"]

[[migrations]]
tag = "v2"
renamed_classes = [{ from = "StableSyncMcpAgent", to = "NeuralRateMcpAgent" }]

[[migrations]]
tag = "v3"
new_sqlite_classes = [
  "NeuralRateReadonlyMcpAgent",
  "NeuralRateConfigMcpAgent",
  "NeuralRateBenchmarkMcpAgent",
  "NeuralRateExecutionMcpAgent",
]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["NeuralRateStateMcpAgent"]
