name = "stablesync-worker"
main = "src/index.ts"
compatibility_date = "2026-05-03"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "CACHE_KV"
id = "cache_kv_placeholder"

[[d1_databases]]
binding = "DECISIONS_DB"
database_name = "stablesync-decisions"
database_id = "d1_placeholder"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "StableSyncMcpAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["StableSyncMcpAgent"]
