name = "neuralrate-worker"
main = "src/index.ts"
compatibility_date = "2026-05-03"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[secrets]
required = ["FRED_API_KEY", "NANSEN_API_KEY", "INTERNAL_API_TOKEN"]

[vars]
NEURALRATE_BENCHMARK_CONTRACT = "0xC0C836A220D006398cdE4D5caf529196E63f81A8"
NEURALRATE_POLICY_REGISTRY_CONTRACT = "0xc4580b5831f36eCc3E4865e635c970C75DD9869C"
NEURALRATE_EXECUTION_GUARD_CONTRACT = "0xe6a70b147fB54F693d1ADAF566Fa52d871D2412b"
NEURALRATE_SAFE_4337_MODULE_ADDRESS = "0x62B79C3dF9F15A94ce821ac558ED74F011bB7a41"
NEURALRATE_SAFE_7579_ADAPTER_ADDRESS = "0x7ec994fD2F774Fb8AAe472C349ED3E64E0A15FEa"
NEURALRATE_SAFE_7579_LAUNCHPAD_ADDRESS = "0x16794305Ccd57F815cf81d7fE20d6B6b4E82AAd2"
NEURALRATE_DELEGATE_VALIDATOR_ADDRESS = "0x0A03F7763d53757183aD86C393eEfF6D8177e4cE"
NEURALRATE_4337_ENTRYPOINT_ADDRESS = "0x0000000071727De22E5E9d8BAf0edAc6f37da032"
NEURALRATE_ERC7484_REGISTRY_ADDRESS = "0x000000000069E2a187AEFFb852bF3cCdC95151B2"
EXECUTOR_BASE_URL = "http://127.0.0.1:8788"



[[kv_namespaces]]
binding = "CACHE_KV"
id = "ce850408cc594b1caba33e1640926d68"

[[d1_databases]]
binding = "DECISIONS_DB"
database_name = "neuralrate-decisions"
database_id = "759b6330-f219-474a-b696-e2ca4f7e143a"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "NeuralRateMcpAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["StableSyncMcpAgent"]

[[migrations]]
tag = "v2"
renamed_classes = [{ from = "StableSyncMcpAgent", to = "NeuralRateMcpAgent" }]
