name = "neuralrate-worker"
main = "src/index.ts"
compatibility_date = "2026-05-03"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
NEURALRATE_BENCHMARK_CONTRACT = "0xC0C836A220D006398cdE4D5caf529196E63f81A8"
NEURALRATE_POLICY_REGISTRY_CONTRACT = "0xc4580b5831f36eCc3E4865e635c970C75DD9869C"
NEURALRATE_EXECUTION_GUARD_CONTRACT = "0xe6a70b147fB54F693d1ADAF566Fa52d871D2412b"
NEURALRATE_SAFE_4337_MODULE_ADDRESS = ""
NEURALRATE_SAFE_7579_ADAPTER_ADDRESS = ""
# Must match the executor/root NEURALRATE_INTERNAL_API_TOKEN during local/dev writes.
INTERNAL_API_TOKEN = "local-neuralrate-internal"
EXECUTOR_BASE_URL = "http://127.0.0.1:8788"



[[kv_namespaces]]
binding = "CACHE_KV"
id = "ce850408cc594b1caba33e1640926d68"

[[d1_databases]]
binding = "DECISIONS_DB"
database_name = "neuralrate-decisions"
database_id = "759b6330-f219-474a-b696-e2ca4f7e143a"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "NeuralRateMcpAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["StableSyncMcpAgent"]

[[migrations]]
tag = "v2"
renamed_classes = [{ from = "StableSyncMcpAgent", to = "NeuralRateMcpAgent" }]
