name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy Frontend to Cloudflare Pages
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Workspace Dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build -w apps/web
        env:
          # If the Vite build needs any build-time environment variables, they can be specified here:
          VITE_BENCHMARK_CONTRACT_ADDRESS: "0xc51560a5512d2A5756435d87319aeaE1bA480165"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=neuralrate --branch=main
